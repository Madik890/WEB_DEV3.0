<section class="page">
  @if (loading) {
    <p class="info">Loading album details...</p>
  } @else if (error && !album) {
    <p class="error">{{ error }}</p>
    <button class="btn" (click)="loadAlbum()">Retry</button>
    <button class="btn secondary" (click)="goBack()">Back</button>
  } @else if (album) {
    <div class="card">
      <h1>Album #{{ album.id }}</h1>

      <p><strong>User ID:</strong> {{ album.userId }}</p>
      <p><strong>Current Title:</strong> {{ album.title }}</p>

      <label for="title"><strong>Edit Title</strong></label>
      <input
        id="title"
        type="text"
        [(ngModel)]="editedTitle"
        placeholder="Enter album title" />

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      @if (successMessage) {
        <p class="success">{{ successMessage }}</p>
      }

      <div class="actions">
        <button class="btn" (click)="save()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>

        <a class="btn secondary" [routerLink]="['/albums', album.id, 'photos']">View Photos</a>
        <button class="btn ghost" (click)="goBack()">Back</button>
      </div>
    </div>
  }
</section>

<section class="page">
  <div class="header">
    <h1>Photos for Album #{{ albumId }}</h1>
    <a class="btn ghost" [routerLink]="['/albums', albumId]">Back</a>
  </div>

  @if (loading) {
    <p class="info">Loading photos...</p>
  } @else if (error) {
    <p class="error">{{ error }}</p>
    <button class="btn" (click)="loadPhotos()">Retry</button>
  } @else if (photos.length === 0) {
    <p class="info">No photos found for this album.</p>
  } @else {
    <div class="grid">
      @for (photo of photos; track trackByPhotoId($index, photo)) {
        <div class="photo-card" [title]="photo.title">
          <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
          <p>{{ photo.title }}</p>
        </div>
      }
    </div>
  }
</section>

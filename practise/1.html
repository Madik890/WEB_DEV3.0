<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="1.css" />
</head>
<body>

<div class="form-container">
    <div class="field">
        <label>Name</label>
        <input type="text" placeholder="абс">
    </div>

    <div class="field">
        <label>Age</label>
        <input type="number" id="ageInput" value="18">
    </div>

    <button onclick="check()">Welcome</button>

    <div id="result"></div>
</div>

<script>
    function check() {
        const age = document.getElementById('ageInput').value;
        const res = document.getElementById('result');
        res.style.display = 'block';

        if (age >= 18) {
            res.textContent = 'You are allowed';
            res.className = 'success';
        } else {
            res.textContent = 'You are not allowed';
            res.className = 'error';
        }
    }
</script>
</body>
</html>
